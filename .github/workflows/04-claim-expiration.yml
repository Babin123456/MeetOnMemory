name: "04 Claim Expiration"

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  issues: write
  contents: read

concurrency:
  group: claim-expiration-${{ github.repository }}
  cancel-in-progress: false

jobs:
  expire-claims:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Process claim expiration
        uses: actions/github-script@v7
        with:
          script: |
            const { processClaimExpiration } = await import(`${process.cwd()}/.github/scripts/expiration.js`);
            await processClaimExpiration({ github, context, core });

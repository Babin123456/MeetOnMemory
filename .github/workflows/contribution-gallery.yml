name: Update Contributors

on:
  pull_request_target:
    types: [closed]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: contributors-gallery
  cancel-in-progress: true

jobs:
  update-contributors:
    if: github.event.pull_request.merged == true && github.event.pull_request.user.type != 'Bot'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Regenerate contributors gallery
        run: node scripts/update-contributors.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          DEFAULT_BRANCH: ${{ github.event.pull_request.base.ref }}

      - name: Create contributors update pull request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: automation/update-contributors
          delete-branch: true
          title: "docs: update contributors gallery"
          commit-message: "docs: update contributors gallery"
          body: |
            Automated contributor gallery refresh after a merged pull request.

            - Rebuilt from full repository history
            - Updated Hall of Fame (Top 5)
            - Updated All Contributors avatars
          labels: |
            documentation
            automation
          assignees: imuniqueshiv
          reviewers: imuniqueshiv
      - name: Enable auto-merge when available
        if: success()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="$(gh pr list --head automation/update-contributors --state open --json number --jq '.[0].number')"
          if [ -n "$PR_NUMBER" ]; then
            gh pr merge "$PR_NUMBER" --auto --merge
          fi

name: "05 PR Validation"

on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened, ready_for_review]

permissions:
  pull-requests: write
  issues: write
  contents: read
  checks: read

concurrency:
  group: pr-${{ github.event.pull_request.number }}-validation
  cancel-in-progress: false

jobs:
  pr-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Validate PR
        uses: actions/github-script@v7
        with:
          script: |
            const { processPrValidation } = await import(`${process.cwd()}/.github/scripts/pr.js`);
            await processPrValidation({ github, context, core });

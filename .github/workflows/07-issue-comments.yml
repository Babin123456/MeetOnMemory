name: "07 Issue Comment Guidance"

on:
  issue_comment:
    types: [created]

permissions:
  issues: write
  contents: read

concurrency:
  group: issue-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  guidance:
    if: github.event.issue.pull_request == null
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Process natural-language claim guidance
        uses: actions/github-script@v7
        with:
          script: |
            const { processIssueCommentGuidance } = await import(`${process.cwd()}/.github/scripts/issue-comments.js`);
            await processIssueCommentGuidance({ github, context, core });

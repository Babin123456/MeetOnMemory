name: "06 PR Merged"

on:
  pull_request_target:
    types: [closed]

permissions:
  pull-requests: write
  issues: write
  contents: read

concurrency:
  group: pr-${{ github.event.pull_request.number }}-merged
  cancel-in-progress: false

jobs:
  merged:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Process merged PR
        uses: actions/github-script@v7
        with:
          script: |
            const { processPrMerged } = await import(`${process.cwd()}/.github/scripts/pr.js`);
            await processPrMerged({ github, context, core });
